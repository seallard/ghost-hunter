services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ghost
      POSTGRES_DB: ghost_hunter
    ports:
      - "5432:5432"
    volumes:
      - ghost_hunter_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ghost", "-d", "ghost_hunter"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ghost_hunter_pg:
